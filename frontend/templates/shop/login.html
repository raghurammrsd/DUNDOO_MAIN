{% extends "base.html" %}
{% block title %}Shopkeeper Login{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card-auth">
    <p class="form-eyebrow">Shopkeeper Direct Login</p>
    <h1 class="form-title-main">Welcome back</h1>
    <p class="form-subtitle">
      Login directly to your shop dashboard using your registered shop name (or email) and password.
    </p>

    <form method="post" class="form-grid">
      <div class="form-group">
        <label for="shop_name" class="form-label">Shop name or Email</label>
        <input
          type="text"
          id="shop_name"
          name="shop_name"
          class="form-input"
          placeholder="RR Bakery or you@example.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Enter your shop password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary form-primary-btn">
        Login to Dashboard
      </button>

      <div class="form-footer-text">
        New shop? <a href="{{ url_for('shop.register') }}">Register here</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
