{% extends "base.html" %}
{% block title %}Shopkeeper Login{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card-auth">
    <p class="form-eyebrow">Shopkeeper Login (OTP)</p>
    <h1 class="form-title-main">Welcome back</h1>
    <p class="form-subtitle">
      Login with your registered shop details. We’ll send a one-time OTP to your email.
    </p>

    <form method="post" class="form-grid">
      <div class="form-group">
        <label for="shop_name" class="form-label">Shop name</label>
        <input
          type="text"
          id="shop_name"
          name="shop_name"
          class="form-input"
          placeholder="RR Bakery"
          required
        >
      </div>

      <div class="form-group">
        <label for="pincode" class="form-label">Pincode</label>
        <input
          type="text"
          id="pincode"
          name="pincode"
          class="form-input"
          placeholder="560001"
          required
        >
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Registered email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="you@example.com"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary form-primary-btn">
        Send OTP
      </button>

      <div class="form-footer-text">
        New shop? <a href="{{ url_for('shop.register') }}">Register here</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
