{% extends "base.html" %}
{% block content %}
<div class="shop-layout">
  <div class="shop-main w-100">

    <a href="{{ url_for('shop.products') }}" class="btn btn-link mb-3">
      &larr; Back to Products
    </a>

    <div class="card">
      <div class="card-header">
        Bulk Upload Products (Excel)
      </div>
      <div class="card-body">
        <p class="text-muted">
          Upload an Excel file (.xlsx or .xls) with columns:
        </p>
        <ul>
          <li><strong>A:</strong> Name</li>
          <li><strong>B:</strong> Description</li>
          <li><strong>C:</strong> Price (number)</li>
          <li><strong>D:</strong> Quantity (number)</li>
          <li><strong>E:</strong> Category</li>
        </ul>

        <form method="post" enctype="multipart/form-data" class="mt-3">
          <div class="mb-3">
            <input type="file" name="file" accept=".xlsx,.xls" class="form-control" required>
          </div>
          <button class="btn btn-primary">Upload</button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
