{% extends "base.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create User Account</h1>
    <p class="auth-subtitle">
      Create your account to search nearby products and place orders right away.
    </p>
    <form method="POST" class="form-grid">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input name="username" class="form-input" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input name="phone" class="form-input" placeholder="+91 ...">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-input" placeholder="Create a strong password" required minlength="4">
      </div>
      <button class="btn btn-primary" style="margin-top: 6px;">Create Account & Login</button>
    </form>
    <div class="auth-footer">
      <span>Already registered?</span> <a href="{{ url_for('user.login') }}">Login here</a>
    </div>
  </div>
</div>
{% endblock %}
